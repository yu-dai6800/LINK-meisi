    .sep {
      width: 152px;
      height: 2px;
      background: var(--orange);
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .person-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: .12em;
      margin-bottom: 4px;
    }

    .person-sub {
      font-size: 11px;
      color: var(--sub);
      letter-spacing: .08em;
    }

    /* ── LINKS ── */
    .card-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 14px 14px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: #FAFAF7;
      border: 1px solid #F0EBE4;
      border-radius: 16px;
      text-decoration: none;
      color: var(--ink);
      transition: background .12s, transform .1s;
    }

    .link-item:hover  { background: #F3EDE6; }
    .link-item:active { transform: scale(.975); }

    /* Icon chip */
    .li-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .li-icon svg { width: 19px; height: 19px; }

    .ic-blue   { background: transparent; }
    .ic-orange { background: transparent; }
    .ic-line   { background: transparent; }
    .li-icon img { width: 100%; height: 100%; object-fit: contain; }
    /* mascot at bottom */
    .mascot-row {
      display: flex;
      justify-content: center;
      padding: 6px 0 0;
      margin-top: 2px;
      border-top: 1px solid #F0EBE4;
    }

    .mascot-row img {
      width: 130px;
      height: 130px;
      object-fit: contain;
    }

    /* Text */
    .li-body {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      flex: 1;
    }

    .li-label {
      font-size: 10px;
      font-weight: 400;
      color: var(--sub);
      letter-spacing: .1em;
    }

    .li-value {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .li-value.sm { font-size: 12px; }

    .li-arrow {
      font-size: 20px;
      color: var(--pale);
      flex-shrink: 0;
      line-height: 1;
    }

    /* ── FOOTER ── */
    .page-footer {
      margin-top: 16px;
      font-size: 11px;
      color: #B0A89E;
      letter-spacing: .12em;
    }
  </style>
